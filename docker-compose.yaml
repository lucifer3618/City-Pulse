services:
  frontend:
    container_name: frontend-container
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env.local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    # Netwroks doenst need to define explicitely
    networks:
      - app-network
    depends_on:
      - backend
    stdin_open: true
    tty: true

  backend:
    container_name: backend-container
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.development.local
    ports:
      - "5500:5500"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - app-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    container_name: mongo-container
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    # Should fix mongo url in the env file
    # Fix mongodb replica error
    command: [ "--replSet", "rs0" ]
    healthcheck:
      test: |
        mongosh --eval "
          try { rs.status().ok } 
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}).ok }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  frontend_node_modules:
  backend_node_modules:


networks:
  app-network:
    driver: bridge
